name: KAI Ads Product Certification Run

# Generates 30 REAL advertisements through the complete GPT-Native
# creative path (Creative Director -> master prompt -> GPT Image ->
# Trust Layer -> acceptance scoring) and pushes every PNG + per-ad
# quality report + certification summary to a disposable inspection
# branch. This is the real-generation product-certification pass; it
# spends real OpenAI image + vision budget on the repo's own API key.
on:
  workflow_dispatch:
  push:
    branches:
      - claude/kai-ads-verify-state-upnt70
    paths:
      - ".github/workflows/certification-run.yml"
      - "scripts/certification/**"

permissions:
  contents: write # push of the run's artifacts to a disposable certification-artifacts-* branch

jobs:
  certify:
    name: Real-API certification (30 advertisements)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fail fast if the OpenAI secret is unavailable (without printing it)
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY secret is NOT available — cannot run the certification."
            exit 1
          fi
          echo "OPENAI_API_KEY secret: PRESENT (value not shown)"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run certification generation + scoring
        run: npx tsx scripts/certification/certification-run.ts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # GPT-Native production models — the exact settings the flag turns on.
          KAI_VISION_MODEL: gpt-4.1
          KAI_IMAGE_MODEL: gpt-image-1
          KAI_IMAGE_QUALITY: high
          GPT_NATIVE_AD_GENERATION: "true"
          KAI_PUBLIC_DOMAIN: ${{ vars.KAI_PUBLIC_DOMAIN || 'https://kai-ads.vercel.app' }}
          # Dummy values satisfying env validation only — certification never
          # touches the database, auth, email, or storage.
          NODE_ENV: development
          DATABASE_URL: postgresql://user:password@localhost:5432/kai_ads_unused
          BETTER_AUTH_SECRET: 0123456789abcdef0123456789abcdef-ci-only
          BETTER_AUTH_URL: http://localhost:3000
          EMAIL_PROVIDER: none
          STORAGE_PROVIDER: none

      - name: Upload certification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kai-certification-${{ github.run_id }}
          path: scripts/certification/artifacts/
          retention-days: 30

      - name: Publish artifacts to a disposable inspection branch
        if: always()
        run: |
          set -e
          if [ ! -d scripts/certification/artifacts ] || [ -z "$(ls -A scripts/certification/artifacts 2>/dev/null)" ]; then
            echo "No artifacts produced — skipping publish."
            exit 0
          fi
          cd scripts/certification/artifacts
          git init -b "certification-artifacts-${GITHUB_RUN_ID}"
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add -A
          git commit -m "KAI Ads certification artifacts (run ${GITHUB_RUN_ID})"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/certification-artifacts-${GITHUB_RUN_ID}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
