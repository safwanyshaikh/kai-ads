# Sprint 008 Workstream H (Supreme Constitution Principle 15): the quality
# gate that runs on EVERY push and pull request. Before this workflow,
# lint/typecheck/tests existed only as npm scripts no automation ever ran —
# nothing blocked a broken build from merging.
name: CI Quality Gate

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      # Simulated production build with dummy required env — proves the
      # app compiles and prerenders exactly as it would on Vercel. Dummy
      # values are build-time placeholders only; no secret is real.
      - name: Production build
        env:
          VERCEL: "1"
          VERCEL_ENV: production
          VERCEL_URL: ci-build.vercel.app
          DATABASE_URL: postgresql://user:password@localhost:5432/kai_ads?schema=public
          BETTER_AUTH_SECRET: ci-dummy-secret-for-build-simulation-0000
          EMAIL_PROVIDER: none
          STORAGE_PROVIDER: none
        run: npx next build
