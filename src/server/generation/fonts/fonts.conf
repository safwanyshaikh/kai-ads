<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Fontconfig for the SVG rasterizer (Sprint 006 Bug 005).

  librsvg (sharp's SVG engine) does NOT read @font-face declarations
  inside the SVG - it resolves every font-family strictly through
  fontconfig. On a host with zero installed fonts (Vercel serverless),
  every glyph therefore rendered as a hollow "tofu" box, even though
  FIX-010 embedded the fonts as base64 inside the SVG.

  This file is pointed to by the FONTCONFIG_FILE environment variable
  (set in src/server/generation/font-config.ts before any
  rasterization) and makes the .ttf files bundled in THIS directory the
  font database, with the renderer's KaiSans/KaiSerif family names
  aliased to the bundled Liberation faces.
-->
<fontconfig>
  <!-- The bundled fonts living next to this file. -->
  <dir prefix="relative">.</dir>

  <!-- Serverless filesystems are read-only except /tmp. -->
  <cachedir>/tmp/fontconfig-cache</cachedir>

  <!-- The renderer's family names -> bundled faces. -->
  <alias binding="strong">
    <family>KaiSans</family>
    <accept><family>Liberation Sans</family></accept>
  </alias>
  <alias binding="strong">
    <family>KaiSerif</family>
    <accept><family>Liberation Serif</family></accept>
  </alias>

  <!-- Any other/unknown family still resolves to a real, bundled font
       rather than tofu. -->
  <match target="pattern">
    <test qual="all" name="family" compare="not_eq"><string>Liberation Sans</string></test>
    <test qual="all" name="family" compare="not_eq"><string>Liberation Serif</string></test>
    <edit name="family" mode="append_last"><string>Liberation Sans</string></edit>
  </match>
</fontconfig>
